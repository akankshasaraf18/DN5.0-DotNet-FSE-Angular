<h2>Student Registration</h2>

<form #studentForm="ngForm" (ngSubmit)="onSubmit()">

  <label>Name</label>
  <br>
  <input
    type="text"
    name="name"
    [(ngModel)]="student.name"
    required>
  <br><br>

  <label>Email</label>
  <br>
  <input
    type="email"
    name="email"
    [(ngModel)]="student.email"
    required>
  <br><br>

  <label>Course</label>
  <br>
  <select
    name="course"
    [(ngModel)]="student.course"
    required>

    <option value="">Select Course</option>
    <option>Angular</option>
    <option>Java</option>
    <option>Spring Boot</option>
    <option>React</option>
    <option>SQL</option>

  </select>

  <br><br>

  <button
    type="submit"
    [disabled]="studentForm.invalid">
    Register
  </button>

</form>
